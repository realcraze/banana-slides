# 此配置文件用于直接拉取 Docker Hub 上已构建好的镜像

services:
  backend:
    # 使用预构建的后端镜像
    image: ${DOCKER_IMAGE_BACKEND:-anoinex/banana-slides-backend:latest}
    container_name: banana-slides-backend
    ports:
      # 宿主机端口:容器内部端口
      # 宿主机端口由 BACKEND_PORT 控制，容器内部固定 5000
      - "${BACKEND_PORT:-5000}:5000"
    # 从 .env 文件自动加载所有环境变量
    env_file:
      - .env
    environment:
      AVATAR_STORAGE_DIR: /app/frontend/public/avatars
      AVATAR_PUBLIC_PATH: /avatars
    # Vertex AI 配置（使用 Vertex AI 时取消以下注释）
    # environment:
    #   - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
    volumes:
      # 持久化数据库
      - ./backend/instance:/app/backend/instance
      # 持久化上传的文件
      - ./uploads:/app/uploads
      # 持久化微软头像缓存，外部 Nginx 可通过 /avatars 访问
      - ./frontend/public/avatars:/app/frontend/public/avatars
      # GCP 服务账户文件（仅 Vertex AI 用户需要取消下一行注释）
      # - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - banana-slides-network

  frontend-build:
    build:
      context: .
      dockerfile: frontend/Dockerfile.export
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: banana-slides-frontend-build
    command: ["sh", "-c", "rm -rf /out/* && cp -R /app/dist/. /out/ && tail -f /dev/null"]
    volumes:
      - ./frontend-dist:/out
    restart: unless-stopped

networks:
  banana-slides-network:
    driver: bridge

volumes:
  backend-data:
  uploads-data:
